spring:
  application:
    name: ticketing-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ticketing}
    username: ${DB_USERNAME:ticketing_app}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate # schema changes come from Flyway only
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      client-type: jedis
      repositories:
        enabled: false # we use Redis for sessions/cache only, not Spring Data repositories

  session:
    timeout: 24h
    data:
      redis:
        namespace: ticketing:session
        repository-type: indexed # lets us find and delete all sessions for one user
        configure-action: none # don't try to change Redis server config on startup

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # a message the consumer rejects goes to the dead-letter queue, never back onto the queue;
        # send retries are driven from Postgres, so the broker must not requeue on its own
        default-requeue-rejected: false

  # used only when app.email.transport=smtp; Gmail needs an app password, not the account password
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  api:
    base-path: /api/v1
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  files:
    allowed-mime-types: ${APP_FILES_ALLOWED_MIME_TYPES:image/jpeg,image/png,image/webp}
    banner-max-size: ${APP_FILES_BANNER_MAX_SIZE:5MB}
    profile-max-size: ${APP_FILES_PROFILE_MAX_SIZE:2MB}
    banner-folder: ${APP_FILES_BANNER_FOLDER:banners}
    profile-folder: ${APP_FILES_PROFILE_FOLDER:avatars}
  auth:
    email-verification-ttl: ${APP_EMAIL_VERIFICATION_TTL:PT24H}
    password-reset-ttl: ${APP_PASSWORD_RESET_TTL:PT1H}
  email:
    log-links: ${APP_EMAIL_LOG_LINKS:false}
    transport: ${APP_EMAIL_TRANSPORT:log}
    from: ${APP_EMAIL_FROM:no-reply@ticketing.local}
  order:
    number-prefix: ${APP_ORDER_NUMBER_PREFIX:ORD}
    number-padding: ${APP_ORDER_NUMBER_PADDING:6}
    number-zone: ${APP_ORDER_NUMBER_ZONE:Asia/Colombo}
    payment-hold: ${APP_ORDER_PAYMENT_HOLD:PT15M}
    expiry-sweep-interval: ${APP_ORDER_EXPIRY_SWEEP_INTERVAL:PT1M}
    expiry-batch-size: ${APP_ORDER_EXPIRY_BATCH_SIZE:100}
  ticket:
    code-prefix: ${APP_TICKET_CODE_PREFIX:TCK}
    code-groups: ${APP_TICKET_CODE_GROUPS:2}
    code-group-length: ${APP_TICKET_CODE_GROUP_LENGTH:4}
    # no default on purpose: issuing tickets fails loudly rather than signing them with a known secret
    token-secret: ${APP_TICKET_TOKEN_SECRET:}
    qr-pixels: ${APP_TICKET_QR_PIXELS:320}
    qr-margin: ${APP_TICKET_QR_MARGIN:2}
  payment:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    gateway-currency: ${APP_PAYMENT_GATEWAY_CURRENCY:LKR}
    success-path: ${APP_PAYMENT_SUCCESS_PATH:/orders/{orderId}?paid=1}
    cancel-path: ${APP_PAYMENT_CANCEL_PATH:/orders/{orderId}?cancelled=1}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  messaging:
    exchange: ${APP_MESSAGING_EXCHANGE:ticketing.email}
    email-queue: ${APP_MESSAGING_EMAIL_QUEUE:ticketing.email.jobs}
    email-routing-key: ${APP_MESSAGING_EMAIL_ROUTING_KEY:email}
    dead-letter-exchange: ${APP_MESSAGING_DEAD_LETTER_EXCHANGE:ticketing.email.dlx}
    dead-letter-queue: ${APP_MESSAGING_DEAD_LETTER_QUEUE:ticketing.email.dead}
    relay-interval: ${APP_MESSAGING_RELAY_INTERVAL:PT2S}
    recovery-interval: ${APP_MESSAGING_RECOVERY_INTERVAL:PT1M}
    recovery-grace: ${APP_MESSAGING_RECOVERY_GRACE:PT5M}
    batch-size: ${APP_MESSAGING_BATCH_SIZE:100}
    retry-backoff: ${APP_MESSAGING_RETRY_BACKOFF:PT1M,PT5M,PT30M,PT2H}
    reminder-interval: ${APP_MESSAGING_REMINDER_INTERVAL:PT15M}
    reminder-lead-time: ${APP_MESSAGING_REMINDER_LEAD_TIME:PT24H}
