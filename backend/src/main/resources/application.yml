spring:
  application:
    name: ticketing-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ticketing}
    username: ${DB_USERNAME:ticketing_app}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate # schema changes come from Flyway only
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    redis:
      namespace: ticketing:session
    timeout: 24h

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
